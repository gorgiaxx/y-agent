<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8b560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9a7c2a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#0f0f0f" />
  <!-- Stylized "y" letterform -->
  <path d="M38 28 L60 70 L60 100 L68 100 L68 70 L90 28 L82 28 L64 60 L46 28 Z" fill="url(#grad)" filter="url(#glow)" />
  <!-- Circuit nodes -->
  <circle cx="90" cy="28" r="4" fill="#c8b560" />
  <circle cx="68" cy="100" r="3.5" fill="#c8b560" />
  <!-- Connection lines -->
  <line x1="90" y1="32" x2="100" y2="46" stroke="#c8b560" stroke-width="2" stroke-linecap="round" />
  <circle cx="100" cy="46" r="3" fill="#9a7c2a" />
  <line x1="100" y1="46" x2="104" y2="64" stroke="#9a7c2a" stroke-width="1.5" stroke-linecap="round" />
  <circle cx="104" cy="64" r="2.5" fill="#9a7c2a" />
</svg>
