[skill]
name = "code-review-rust"
version = "1.0.0"
description = "Review Rust code for correctness, safety, idiomatic patterns, and performance"
author = "y-agent-builtin"
source_format = "markdown"
created = "2026-03-13T12:00:00Z"

[skill.classification]
type = "llm_reasoning"
domain = ["rust", "code-review", "engineering"]
atomic = true

[skill.constraints]
max_input_tokens = 8000
max_output_tokens = 8000

[skill.root]
path = "root.md"
token_count = 900

[skill.tree]
sub_documents = [
    { path = "details/error-handling-patterns.md", title = "Rust error handling best practices", token_count = 800 },
    { path = "details/unsafe-review-checklist.md", title = "Checklist for reviewing unsafe blocks", token_count = 500 },
]

[skill.references]
tools = []
skills = []
knowledge_bases = []

[skill.safety]
allows_external_calls = false
allows_file_operations = false
allows_code_execution = false
max_delegation_depth = 0
