# Browser tool (Chrome DevTools Protocol) configuration.
# Place this file at ~/.config/y-agent/browser.toml or config/browser.toml

# Enable/disable the browser tool entirely.
# enabled = true

# ---------- Launch Mode ----------
# Controls how Chrome is started and connected.
#
# Options:
#   "remote"               - Connect to an already-running Chrome via CDP URL (default)
#   "auto_launch_headless" - Auto-launch Chrome in headless mode (no visible window)
#   "auto_launch_visible"  - Auto-launch Chrome with a visible window (for debugging)
#
# When using "remote", you must start Chrome manually with:
#   chrome --remote-debugging-port=9222
#
# When using "auto_launch_headless" or "auto_launch_visible", y-agent will
# automatically find and launch Chrome/Chromium/Edge.
launch_mode = "auto_launch_headless"

# Path to Chrome/Chromium executable.
# Leave empty for auto-detection (tries Google Chrome, Chromium, Edge, etc.)
# Windows example: chrome_path = 'C:\Program Files\Google\Chrome\Application\chrome.exe'
# chrome_path = ""

# Remote debugging port for the auto-launched Chrome.
# local_cdp_port = 9222

# Use the system user's Chrome profile (bookmarks, cookies, extensions, etc.)
# instead of a clean temporary profile.
# When true, Chrome uses the default user data directory:
#   macOS:   ~/Library/Application Support/Google/Chrome
#   Windows: %LOCALAPPDATA%\Google\Chrome\User Data
#   Linux:   ~/.config/google-chrome
#
# NOTE: Chrome locks its profile directory. If Chrome is already running
# with the same profile, the auto-launched instance may fail. Close other
# Chrome instances before enabling this.
# use_user_profile = false

# ---------- Remote CDP Mode ----------
# Used when launch_mode = "remote".

# CDP endpoint URL.
# Supports http://, https://, ws://, wss://
# cdp_url = "http://127.0.0.1:9222"

# ---------- Shared Settings ----------

# Default timeout for CDP operations (milliseconds).
# timeout_ms = 30000

# Allowed domains for navigation. Use ["*"] to allow all public domains.
# Empty list = block all navigation.
# allowed_domains = ["*"]

# Block navigation to private/local network addresses (10.x, 192.168.x, etc.)
# Recommended to stay enabled for security (SSRF protection).
# block_private_networks = true

# Maximum screenshot width/height in pixels.
# max_screenshot_dim = 4096

# Default search engine for the 'search' action.
# Supported: "google", "bing", "duckduckgo", "baidu".
# default_search_engine = "google"
