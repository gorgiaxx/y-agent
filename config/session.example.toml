# ==============================================================================
# y-agent -- Session Configuration
# ==============================================================================

# Maximum tree depth for branching sessions.
max_depth = 16

# Maximum active sessions per root session.
max_active_per_root = 8

# Compaction trigger threshold as a percentage of the serving provider's
# context window (e.g. 85 = compact when usage exceeds 85%).
compaction_threshold_pct = 85

# Auto-archive sessions when they are merged.
auto_archive_merged = true

# ==============================================================================
# Context Pruning Configuration
# ==============================================================================

[pruning]

# Master switch for the pruning engine.
enabled = true

# Minimum token growth since last pruning to trigger a new pruning pass.
# Pruning only runs when (current_tokens - last_pruned_tokens) >= this value.
token_threshold = 2000

# Strategy selection: "auto" (both), "retry_only", or "progressive_only".
strategy = "auto"

# Progressive pruning settings (subagent-based summarization).
# Model selection is handled by the pruning-summarizer agent definition
# (preferred_models + provider_tags).
[pruning.progressive]
max_retries = 2
preserve_identifiers = true

# Intra-turn pruning: removes failed tool call branches from the
# in-memory working history between tool call iterations, before
# each LLM call. Only RetryPruning heuristics run (zero LLM cost).
[pruning.intra_turn]
enabled = true
min_iteration = 3
token_threshold = 1000
