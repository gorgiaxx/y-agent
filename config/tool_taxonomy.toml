# Default tool taxonomy for y-agent.
#
# Hierarchical categories for lazy tool discovery via the `tool_search`
# meta-tool. Only category names and descriptions are injected into the
# system prompt (~100 tokens). Full tool schemas are loaded on demand.
#
# Keyword search (`query`) also returns matching skills and agents
# from their respective registries for unified capability discovery.
#
# Reference: docs/standards/TOOL_CALL_PROTOCOL.md

[categories.file]
label = "File Management"
description = "Read, write, and manage files"

[categories.file.subcategories.read]
label = "File Reading"
description = "Read file contents"
tools = ["file_read"]

[categories.file.subcategories.write]
label = "File Writing"
description = "Create or modify files"
tools = ["file_write"]

[categories.shell]
label = "Shell"
description = "Execute shell commands"
tools = ["shell_exec"]

[categories.network]
label = "Network"
description = "HTTP requests, DNS, connectivity, browser automation, web browsing, internet access, fetch web pages, online search, weather, news"
tools = ["browser"]

[categories.memory]
label = "Memory & Knowledge"
description = "Store, recall, and search knowledge"

[categories.search]
label = "Search & Retrieval"
description = "Search and retrieve information from knowledge base and documents"

[categories.agent]
label = "Agent & Workflow"
description = "Delegate to sub-agents, manage workflows. Agents are also discoverable via keyword search."

[categories.meta]
label = "Meta Tools"
description = "Tool management and unified capability discovery (tools, skills, agents)"
tools = ["tool_search"]

