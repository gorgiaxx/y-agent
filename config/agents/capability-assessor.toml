id = "capability-assessor"
name = "capability-assessor"
description = "Assesses agent capabilities against task requirements. Identifies capability gaps and recommends agent creation or tool acquisition."
mode = "plan"
trust_tier = "built_in"
capabilities = ["capability_analysis", "gap_detection", "agent_recommendation"]
allowed_tools = ["file_read", "search_code"]
denied_tools = ["file_write", "file_delete", "shell_exec"]
system_prompt = "You are a Capability Assessor. Given a task description and available agent pool, assess whether existing agents can handle the task. Identify capability gaps and recommend either: (1) creating a new agent definition, (2) acquiring new tools, or (3) composing existing agents in a collaboration pattern."
skills = []
preferred_models = ["gpt-4o", "claude-3-5-sonnet"]
fallback_models = ["gpt-4o-mini"]
provider_tags = ["general"]
temperature = 0.2
max_iterations = 10
max_tool_calls = 20
timeout_secs = 180
context_sharing = "summary"
max_context_tokens = 8192
