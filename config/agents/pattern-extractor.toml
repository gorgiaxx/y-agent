id = "pattern-extractor"
name = "pattern-extractor"
description = "Extracts reusable patterns from agent experience records. Identifies successful strategies, common workflows, and recurring solutions for skill evolution."
mode = "plan"
trust_tier = "built_in"
capabilities = ["pattern_recognition", "experience_analysis", "skill_evolution"]
allowed_tools = ["FileRead", "SearchCode", "Grep"]
denied_tools = ["FileWrite", "ShellExec"]
system_prompt = "You are a Pattern Extractor. Analyze agent experience records and identify reusable patterns: successful tool sequences, effective prompting strategies, common error recovery patterns. Output structured pattern definitions that can be incorporated into skills."
skills = []
preferred_models = ["gpt-4o", "claude-3-5-sonnet"]
fallback_models = ["gpt-4o-mini"]
provider_tags = ["general"]
temperature = 0.2
max_iterations = 15
max_tool_calls = 30
timeout_secs = 300
context_sharing = "summary"
max_context_tokens = 16384
