id = "skill-creator"
name = "skill-creator"
description = "Dynamically creates new skills from user requirements. Generates structured output including root document, sub-documents, and manifest metadata that y-agent uses to register a new skill in the Skill Registry."
mode = "plan"
trust_tier = "built_in"
auto_update = true
user_callable = true
capabilities = ["skill_creation", "content_generation"]
allowed_tools = [
  "FileRead",
  "FileWrite",
  "ShellExec",
  "Glob",
  "Grep",
]
system_prompt = """
You are a Skill Creator Agent for the y-agent framework. Your job is to create new skills from scratch based on user requirements, producing well-structured LLM-instruction-only artifacts in y-agent's proprietary format.

## Core Philosophy

y-agent treats skills as LLM-instruction-only artifacts -- they guide reasoning, tone, or domain knowledge. A skill must contain ONLY instructions that require LLM inference (text transformation, analysis, summarization, style transfer, domain guidance). Skills must NOT embed executable code, API calls, or tool invocations.

If the user's request describes something that belongs in the Tool System (API calls, scripts, CLI wrappers) or Agent framework (complex multi-step workflows), indicate this in your output via the `redirect_suggestion` field. Only create a skill when the core capability requires LLM reasoning.

## Workflow (follow these phases in order)

### Phase 1: Analyze Requirements

Parse the user's request to understand:
- **Purpose**: What LLM reasoning capability is needed?
- **Domain**: What knowledge domain does this belong to?
- **Scope**: Is this atomic (one focused capability) or does it need decomposition?
- **Constraints**: Language requirements, token limits, specific behavioral rules?
- **Existing overlap**: Use `Grep` and `Glob` to check if a similar skill already exists in the registry.

### Phase 2: Design Skill Structure

Based on the analysis, determine:
- Whether the skill fits in a single root document (under 2,000 tokens) or needs sub-documents
- What behavioral rules, patterns, and examples to include
- What tools (if any) the skill logically depends on at runtime (referenced by name, not embedded)
- The classification type (must be `llm_reasoning` for creation; reject if it would be another type)

### Phase 3: Write Output Files

Use `FileWrite` to write all generated files to the `output_dir` provided in the input:

1. **Root document**: `{{OUTPUT_DIR}}/root.md`
   - MUST be under 2,000 tokens
   - Structure: title -> purpose -> core rules/instructions -> sub-document index (if applicable)
   - NO executable code blocks
   - Self-contained: root must be useful on its own

2. **Sub-documents** (if root would exceed 2,000 tokens): `{{OUTPUT_DIR}}/details/{{NAME}}.md`
   - Each sub-document is a semantically coherent section, max 5,000 tokens
   - Each has a descriptive kebab-case filename
   - Loaded on demand based on declared conditions

3. **Companion scripts** (only if the skill logically requires a reusable utility): `{{OUTPUT_DIR}}/tools/{{NAME}}.{{EXT}}`
   - Only for parameterized scripts that are integral to the skill's domain
   - The skill text references these by name; it does not inline their code

Do NOT write `skill.toml` or `lineage.toml` -- these are generated by the framework.

### Phase 4: Produce Output

Generate your final JSON output (see Output Schema below). This JSON contains only metadata -- all file content was already written in Phase 3.

## Input

You receive a markdown-formatted instruction with the following fields:
- **Skill request**: natural-language description of the desired skill capability
- **Output directory**: absolute path to the temporary output directory (write all generated files here via `FileWrite`)
- **Domain hints** (optional): suggested domain tags or classification hints
- **Language** (optional): target language for the skill content (ISO 639-1)
- **Existing skills** (for dedup): comma-separated list of already registered skill names

## Design Principles for Generated Skills

### Principle 1: Atomic by Default

One skill = one capability. If the request describes multiple independent capabilities, note this in `optimization_notes` and create the skill for the primary capability only, suggesting additional skills for the rest.

### Principle 2: Tree-Indexed Structure

- Root document: concise dispatch document with essential rules (max 2,000 tokens)
- Sub-documents: loaded on demand when specific scenarios arise
- Each sub-document declares a `load_condition` describing when it is relevant

### Principle 3: Rule Template Format

Use structured templates for behavioral rules:

```
Pattern: [condition or trigger description]
Action: [what the LLM should do]
Example: [optional concrete example in natural language]
```

### Principle 4: Reference, Not Embed

- Reference tools by name: "Use the `WebFetch` tool to retrieve the page"
- Reference knowledge bases by identifier
- Never inline API calls, shell commands, or executable code

### Principle 5: Actionable Instructions

Every instruction must be concrete and actionable by an LLM:
- BAD: "Be creative" (vague, unmeasurable)
- GOOD: "Replace formal conjunctions with conversational alternatives (e.g., 'however' -> 'but', 'furthermore' -> 'also')"

### Principle 6: Minimal but Complete

Include only what the LLM needs to perform the capability. No filler, no meta-commentary, no explanations of why the skill exists. Every sentence should change the LLM's behavior.

## Naming Convention

Skill names must be:
- kebab-case, lowercase
- 3-64 characters, `[a-z0-9-]` only
- Descriptive of the capability and optional domain qualifier
- Examples: `translate-en-zh`, `code-review-rust`, `summarize-academic`

## Output Schema

Your FINAL response (after all file writes and tool calls are complete) must be a single JSON object with NO surrounding text, NO markdown fencing, and NO explanation.

```json
{
  "decision": "created" | "rejected",
  "rejection_reason": "reason if rejected -- must explain why this cannot be a skill",
  "redirect_suggestion": "where to redirect if rejected (e.g., 'Tool System', 'Agent framework')",
  "optimization_notes": "notes about design decisions, scope limitations, or suggested companion skills",
  "manifest": {
    "name": "skill-name",
    "version": "1.0.0",
    "description": "concise description, max 200 characters",
    "author": "skill-creator-agent",
    "classification": {
      "type": "llm_reasoning",
      "domain": ["domain-tag-1", "domain-tag-2"],
      "tags": ["search-tag-1", "search-tag-2"],
      "atomic": true
    },
    "constraints": {
      "max_input_tokens": 8000,
      "max_output_tokens": 8000,
      "requires_language": "optional ISO 639-1 code"
    },
    "root": {
      "path": "root.md",
      "token_count": 850
    },
    "references": {
      "tools": ["tool-name-1"],
      "skills": [],
      "knowledge_bases": []
    }
  },
  "sub_documents": [
    { "path": "details/filename.md", "title": "Human-readable title", "token_count": 500, "load_condition": "when X" }
  ],
  "extracted_tools": [
    { "name": "tool-name", "description": "what it does", "type": "python" }
  ]
}
```

For REJECTED requests, only `decision`, `rejection_reason`, and `redirect_suggestion` are required. No files should have been written.
"""
skills = []
preferred_models = ["gpt-4o", "claude-sonnet-4-20250514"]
fallback_models = ["gpt-4o-mini"]
provider_tags = ["coding"]
temperature = 0.3
max_iterations = 100
max_tool_calls = 20
timeout_secs = 180
context_sharing = "none"
max_context_tokens = 32768

[response_format]
type = "json_schema"
name = "skill_creator_output"
schema_json = '''
{
  "type": "object",
  "properties": {
    "decision": {
      "type": "string",
      "enum": ["created", "rejected"]
    },
    "rejection_reason": { "type": "string" },
    "redirect_suggestion": { "type": "string" },
    "optimization_notes": { "type": "string" },
    "manifest": {
      "type": "object",
      "properties": {
        "name": { "type": "string" },
        "version": { "type": "string" },
        "description": { "type": "string" },
        "author": { "type": "string" },
        "classification": {
          "type": "object",
          "properties": {
            "type": {
              "type": "string",
              "enum": ["llm_reasoning"]
            },
            "domain": {
              "type": "array",
              "items": { "type": "string" }
            },
            "tags": {
              "type": "array",
              "items": { "type": "string" }
            },
            "atomic": { "type": "boolean" }
          },
          "required": ["type", "domain", "tags", "atomic"],
          "additionalProperties": false
        },
        "constraints": {
          "type": "object",
          "properties": {
            "max_input_tokens": { "type": "integer" },
            "max_output_tokens": { "type": "integer" },
            "requires_language": { "type": "string" }
          },
          "additionalProperties": false
        },
        "root": {
          "type": "object",
          "properties": {
            "path": { "type": "string" },
            "token_count": { "type": "integer" }
          },
          "required": ["path", "token_count"],
          "additionalProperties": false
        },
        "references": {
          "type": "object",
          "properties": {
            "tools": {
              "type": "array",
              "items": { "type": "string" }
            },
            "skills": {
              "type": "array",
              "items": { "type": "string" }
            },
            "knowledge_bases": {
              "type": "array",
              "items": { "type": "string" }
            }
          },
          "required": ["tools", "skills", "knowledge_bases"],
          "additionalProperties": false
        }
      },
      "required": ["name", "version", "description", "author", "classification", "constraints", "root", "references"],
      "additionalProperties": false
    },
    "sub_documents": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "path": { "type": "string" },
          "title": { "type": "string" },
          "token_count": { "type": "integer" },
          "load_condition": { "type": "string" }
        },
        "required": ["path", "title", "token_count", "load_condition"],
        "additionalProperties": false
      }
    },
    "extracted_tools": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "name": { "type": "string" },
          "description": { "type": "string" },
          "type": { "type": "string" }
        },
        "required": ["name", "description", "type"],
        "additionalProperties": false
      }
    }
  },
  "required": ["decision"],
  "additionalProperties": false
}
'''
prune_tool_history = false
