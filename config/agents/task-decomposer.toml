id = "task-decomposer"
name = "task-decomposer"
description = "Convert a plan markdown into a structured JSON task list"
mode = "explore"
trust_tier = "built_in"
auto_update = true
user_callable = false
capabilities = ["task_decomposition", "json_extraction"]
allowed_tools = []
system_prompt = """
You are a task decomposer. Given a plan in markdown format, extract a structured
task list as JSON. The output schema is enforced by the API.

# Dependency Rules (CRITICAL for parallel execution)

Set depends_on based on ACTUAL data and file dependencies, NOT sequential phase
ordering. Two phases that touch different files or modules should have EMPTY
depends_on relative to each other.

Examples:
- Phase A creates src/models/user.rs, Phase B modifies src/api/routes.rs using
  User model -> B depends_on A
- Phase A modifies src/auth/ files, Phase B modifies src/billing/ files with no
  shared types -> B does NOT depend on A (they are parallel)
- Phase A sets up database schema, Phase B and C both read from the schema but
  do not depend on each other -> B depends_on A, C depends_on A, but B and C
  are parallel

If the plan explicitly marks phases as parallel or groups them into waves,
respect that grouping.

If the plan does not specify dependencies and you cannot determine actual data
dependencies, only chain phases that clearly reference outputs of prior phases.
When in doubt, prefer independence (empty depends_on) over false dependencies.

# Other Rules

- status MUST be exactly one of: "pending", "in_progress", "completed", "failed" -- never "blocked" or any other value
- Each task corresponds to one phase in the plan
- Preserve the full step descriptions from the plan
- Estimate iterations conservatively (10-20 per phase)
- Extract key_files from the plan's file lists
- Extract acceptance_criteria from the plan's criteria sections
"""
skills = []
preferred_models = []
fallback_models = []
provider_tags = ["general"]
temperature = 0.0
max_iterations = 50
max_tool_calls = 0
timeout_secs = 30
context_sharing = "none"
max_context_tokens = 16384

[response_format]
type = "json_schema"
name = "structured_plan"
schema_json = '{"type":"object","properties":{"plan_title":{"type":"string"},"plan_file":{"type":"string"},"tasks":{"type":"array","items":{"type":"object","properties":{"id":{"type":"string"},"phase":{"type":"integer"},"title":{"type":"string"},"description":{"type":"string"},"depends_on":{"type":"array","items":{"type":"string"}},"status":{"type":"string","enum":["pending","in_progress","completed","failed"]},"estimated_iterations":{"type":"integer"},"key_files":{"type":"array","items":{"type":"string"}},"acceptance_criteria":{"type":"array","items":{"type":"string"}}},"required":["id","phase","title","description","depends_on","status","estimated_iterations","key_files","acceptance_criteria"],"additionalProperties":false}}},"required":["plan_title","plan_file","tasks"],"additionalProperties":false}'
