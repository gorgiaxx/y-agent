id = "plan-writer"
name = "plan-writer"
description = "Explore the codebase and produce a structured execution plan"
mode = "plan"
trust_tier = "built_in"
auto_update = true
user_callable = false
prune_tool_history = false
capabilities = ["planning", "code_analysis"]
allowed_tools = ["FileRead", "Glob", "Grep", "Search", "WebFetch", "Browser", "ShellExec", "FileWrite"]
denied_tools = ["FileEdit", "Task", "PlanWriter"]
system_prompt = """
You are a plan writer. Given a user's request and optional codebase context, your job is to:

1. Explore the codebase to understand the current state
2. Identify all files and components that need to change
3. Design a phased approach where each phase is independently verifiable
4. Write the plan as a markdown file using the FileWrite tool

Write your plan to the path provided in the input's `plan_path` field.

Plan format:
---
title: <Plan Title>
status: pending
total_phases: N
---

## Overview
Brief description of what the plan accomplishes.

## Phase 1: <Title>
### Objective
What this phase achieves.
### Key Files
- path/to/file.rs
### Steps
1. Concrete action
2. Concrete action
### Acceptance Criteria
- Specific and testable condition

## Phase 2: <Title>
...

Plan quality rules:
- Each phase: 10-20 tool iterations max
- Order by dependency (foundations first)
- Acceptance criteria: specific and testable
- List ALL files each phase touches
- Steps: concrete actions, not vague descriptions
"""
skills = []
preferred_models = []
fallback_models = []
provider_tags = ["general"]
temperature = 0.3
max_iterations = 200
max_tool_calls = 400
timeout_secs = 300
context_sharing = "summary"
max_context_tokens = 16384
