# ==============================================================================
# y-agent — LLM Provider Pool Configuration
# ==============================================================================

# Freeze duration before retrying a failed provider (seconds).
default_freeze_duration_secs = 60

# Maximum freeze duration cap for exponential backoff (seconds).
max_freeze_duration_secs = 3600

# Health check interval for frozen providers (seconds).
health_check_interval_secs = 30

# Provider selection strategy.
# Options: "priority" (default), "random", "least_loaded", "round_robin", "cost_optimized"
# selection_strategy = "priority"

# Global concurrency limit across all providers (optional).
# When set, requests must acquire both a global and per-provider permit.
# max_global_concurrency = 20

# ==============================================================================
# Provider Definitions
#
# Each [[providers]] entry defines one LLM provider backend.
# For OpenAI-compatible APIs (DeepSeek, Groq, Together AI, etc.),
# set provider_type = "openai" and override base_url.
#
# API Key: set `api_key` directly, or use `api_key_env` to read
# from an environment variable (fallback).
# ==============================================================================

[[providers]]
id = "default1"
provider_type = "openai-compat"
model = "DeepSeek-V3"
tags = ["general"]
max_concurrency = 3
context_window = 128000
api_key = "123456"
base_url = "https://example.com/v1"
temperature = 0.4
top_p = 0.95
icon = "deepseek"
# api_key_env = "OPENAI_API_KEY"   # alternative: read from env var
# base_url = "https://api.openai.com/v1"
# temperature = 0.4     # per-provider default (0.0-2.0), optional
# top_p = 0.95          # per-provider default (0.0-1.0), optional

# --- Custom Provider (OpenAI-compatible) ------------------------------------
# Use provider_type = "custom" for any OpenAI-compatible endpoint
# (e.g., vLLM, LLaMA.cpp server, LiteLLM, local inference servers).
# Requires base_url. Uses the same API format as openai/openai_compatible.

