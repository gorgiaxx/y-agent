# ==============================================================================
# Proxy Configuration (Multi-Level)
#
# Cascade priority: provider-specific > tag-level > global.
# Default protocol: SOCKS5 (when no scheme specified in URL).
# Supports: socks5://, socks5h:// (DNS at proxy), http://, https://.
# Set enabled = false to bypass proxy for specific providers (e.g., local Ollama).
# ==============================================================================

# [proxy]
# # Default scheme prepended when proxy URL has no scheme (e.g., "proxy.com:1080").
# # Supported: "socks5" (default), "socks5h", "http", "https".
# default_scheme = "socks5"

# [proxy.global]
# url = "socks5://proxy.company.com:1080"
# # Optional: env var containing proxy credentials as "username:password".
# # auth_env = "PROXY_AUTH"

# [proxy.tags.china]
# url = "http://cn-proxy.company.com:8080"

# [proxy.tags.us]
# url = "socks5h://us-proxy.company.com:1080"  # DNS resolved at proxy side

# [proxy.providers.ollama-local]
# enabled = false  # Local provider, no proxy needed

# [proxy.providers.azure-eastus]
# url = "socks5://azure-proxy.company.com:1080"

