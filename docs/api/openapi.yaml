  /api/v1/skills/import:
    post:
      operationId: importSkill
      tags: [Skills]
      summary: Import a skill from a local source path
      description: |
        Imports a skill from a path visible to the y-agent server process.
        Trusted TOML skills may be imported directly with `sanitize=false`;
        other formats use the agent-assisted ingestion pipeline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                sanitize:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                required: [decision, classification, security_issues]
                properties:
                  decision:
                    type: string
                    enum: [accepted, optimized, partial_accept, rejected]
                  classification:
                    type: string
                  skill_id:
                    type: [string, "null"]
                  error:
                    type: [string, "null"]
                  security_issues:
                    type: array
                    items:
                      type: string
                  permissions_needed:
                    type: [object, "null"]
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

