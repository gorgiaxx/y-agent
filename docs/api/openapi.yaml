    post:
      operationId: rewindRestoreFiles
      tags: [Rewind]
      summary: Restore files only (no transcript truncation)
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_message_id]
              properties:
                target_message_id:
                  type: string
      responses:
        "200":
          description: File restoration report
          content:
            application/json:
              schema:
                type: object
                properties:
                  restored:
                    type: array
                    items:
                      type: string
                  deleted:
                    type: array
                    items:
                      type: string
                  conflicts:
                    type: array
                    items:
                      type: object

