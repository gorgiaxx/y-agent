openapi: "3.1.0"
info:
  title: y-agent Web API
  version: 0.2.0
  description: |
    RESTful API for y-agent -- exposes the same business logic as the CLI/TUI
    and the Tauri desktop GUI.  All endpoints return JSON.  Real-time push
    events are delivered via Server-Sent Events (SSE).
    Errors use a compact JSON body with `error` and `message` fields.
  contact:
    name: y-agent team
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: System
    description: Health checks, system status, providers, and app paths
  - name: Sessions
    description: Session lifecycle management
  - name: Chat
    description: Chat turns -- synchronous and async (SSE-streamed)
  - name: Agents
    description: Agent registry CRUD, reload, tools, and prompt sections
  - name: Tools
    description: Tool registry queries
  - name: Config
    description: Configuration sections, reload, MCP, and prompt files
  - name: Workspaces
    description: Workspace CRUD and session mapping
  - name: Skills
    description: Skill management and file editing
  - name: Knowledge
    description: Knowledge-base collections, entries, search, and ingestion
  - name: Observability
    description: Live system state snapshots
  - name: Rewind
    description: Atomic rollback of conversation and filesystem state
  - name: Attachments
    description: File attachment reading
  - name: Diagnostics
    description: Trace queries and diagnostics
  - name: Workflows
    description: Workflow CRUD, validation, DAG, and execution
  - name: Schedules
    description: Schedule CRUD, pause/resume, execution history, and triggers
  - name: Events
    description: Server-Sent Events for real-time push notifications
  - name: Bots
    description: Bot adapter webhooks (Feishu, Discord)

paths:
  # ================================================================
  #  System
  # ================================================================
  /health:
    get:
      operationId: healthCheck
      tags: [System]
      summary: Liveness probe
      description: Returns 200 if the server is running. Suitable for k8s liveness probes.
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/status:
    get:
      operationId: systemStatus
      tags: [System]
      summary: Full system status report
      description: Returns provider, tool, runtime, and diagnostics status.
      responses:
        "200":
          description: System status report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReport"

  /api/v1/providers:
    get:
      operationId: listProviders
      tags: [System]
      summary: List registered LLM providers
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/v1/app-paths:
    get:
      operationId: appPaths
      tags: [System]
      summary: Return application directory paths
      responses:
        "200":
          description: Application paths (config_dir, data_dir)
          content:
            application/json:
              schema:
                type: object
                properties:
                  config_dir:
                    type: string
                  data_dir:
                    type: string

  # ================================================================
  #  Events (SSE)
  # ================================================================
  /api/v1/events:
    get:
      operationId: eventStream
      tags: [Events]
      summary: SSE event stream
      description: |
        Server-Sent Events endpoint for real-time push notifications.
        Replaces Tauri `app.emit()` for browser clients.
        Events include: ChatStarted, ChatProgress, ChatComplete, ChatError,
        AskUser, PermissionRequest, TitleUpdated, DiagnosticsEvent,
        KbBatchProgress, KbEntryIngested.
      parameters:
        - name: session_id
          in: query
          schema:
            type: string
          description: Filter events to a specific session
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  # ================================================================
  #  Sessions
  # ================================================================
  /api/v1/sessions:
    get:
      operationId: listSessions
      tags: [Sessions]
      summary: List sessions (newest first)
      parameters:
        - name: state
          in: query
          schema:
            type: string
            enum: [Active, Archived]
          description: Filter by state (default Active)
        - name: agent_id
          in: query
          schema:
            type: string
          description: Filter by agent ID
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionInfo"
    post:
      operationId: createSession
      tags: [Sessions]
      summary: Create a new session
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"

  /api/v1/sessions/{session_id}:
    get:
      operationId: getSession
      tags: [Sessions]
      summary: Get session details
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteSession
      tags: [Sessions]
      summary: Delete a session permanently
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/messages:
    get:
      operationId: listMessages
      tags: [Sessions]
      summary: List messages in a session
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: last
          in: query
          schema:
            type: integer
            minimum: 1
          description: Return only the last N messages
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageInfo"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/archive:
    post:
      operationId: archiveSession
      tags: [Sessions]
      summary: Archive a session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/branch:
    post:
      operationId: branchSession
      tags: [Sessions]
      summary: Branch from an existing session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchRequest"
      responses:
        "201":
          description: Branch created
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sessions/{session_id}/truncate:
    post:
      operationId: truncateMessages
      tags: [Sessions]
      summary: Truncate session messages
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [keep_count]
              properties:
                keep_count:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: Messages truncated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/sessions/{session_id}/context-reset:
    get:
      operationId: getContextReset
      tags: [Sessions]
      summary: Get context reset index
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Context reset index
          content:
            application/json:
              schema:
                type: object
                properties:
                  index:
                    type: integer
                    nullable: true
    put:
      operationId: setContextReset
      tags: [Sessions]
      summary: Set context reset index
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                index:
                  type: integer
                  nullable: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/sessions/{session_id}/custom-prompt:
    get:
      operationId: getCustomPrompt
      tags: [Sessions]
      summary: Get session custom system prompt
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Custom prompt (null if not set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    type: string
                    nullable: true
    put:
      operationId: setCustomPrompt
      tags: [Sessions]
      summary: Set session custom system prompt
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/sessions/{session_id}/fork:
    post:
      operationId: forkSession
      tags: [Sessions]
      summary: Fork a session at a specific message index
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message_index]
              properties:
                message_index:
                  type: integer
                title:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Forked session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"

  /api/v1/sessions/{session_id}/rename:
    put:
      operationId: renameSession
      tags: [Sessions]
      summary: Set or clear manual title
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ================================================================
  #  Chat
  # ================================================================
  /api/v1/chat:
    post:
      operationId: chatTurn
      tags: [Chat]
      summary: Synchronous single chat turn
      description: |
        Sends a user message and blocks until the full turn completes.
        Handles tool calling internally. For streaming, use `/chat/send` + SSE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat turn completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/chat/send:
    post:
      operationId: chatSend
      tags: [Chat]
      summary: Async chat turn with SSE streaming
      description: |
        Starts an async turn. Returns immediately with session_id and run_id.
        Progress, completion, and errors are streamed via GET /api/v1/events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatSendRequest"
      responses:
        "200":
          description: Turn started
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  run_id:
                    type: string

  /api/v1/chat/cancel:
    post:
      operationId: chatCancel
      tags: [Chat]
      summary: Cancel a running chat turn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [run_id]
              properties:
                run_id:
                  type: string
      responses:
        "200":
          description: Cancelled (or not found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/chat/undo:
    post:
      operationId: chatUndo
      tags: [Chat]
      summary: Undo to a checkpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, checkpoint_id]
              properties:
                session_id:
                  type: string
                checkpoint_id:
                  type: string
      responses:
        "200":
          description: Undo result
          content:
            application/json:
              schema:
                type: object

  /api/v1/chat/resend:
    post:
      operationId: chatResend
      tags: [Chat]
      summary: Resend from a checkpoint (async, SSE-streamed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, checkpoint_id]
              properties:
                session_id:
                  type: string
                checkpoint_id:
                  type: string
                agent_id:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Run started
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  run_id:
                    type: string

  /api/v1/chat/checkpoints/{session_id}:
    get:
      operationId: listCheckpoints
      tags: [Chat]
      summary: List checkpoints for a session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Checkpoint list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatCheckpointInfo"

  /api/v1/chat/find-checkpoint:
    post:
      operationId: findCheckpoint
      tags: [Chat]
      summary: Find a checkpoint matching a user message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, user_message_content]
              properties:
                session_id:
                  type: string
                user_message_content:
                  type: string
                message_id:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Matched checkpoint (null if not found)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ChatCheckpointInfo"
                  - type: "null"

  /api/v1/chat/messages-with-status/{session_id}:
    get:
      operationId: messagesWithStatus
      tags: [Chat]
      summary: Messages with active/tombstone branch status
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Messages with status metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/v1/chat/restore-branch:
    post:
      operationId: restoreBranch
      tags: [Chat]
      summary: Swap active and tombstone branches
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id:
                  type: string
      responses:
        "200":
          description: Branch restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/chat/compact/{session_id}:
    post:
      operationId: contextCompact
      tags: [Chat]
      summary: Run context compaction on a session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Compaction result
          content:
            application/json:
              schema:
                type: object

  /api/v1/chat/answer-question:
    post:
      operationId: answerQuestion
      tags: [Chat]
      summary: Deliver an AskUser answer to a waiting turn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, answer]
              properties:
                session_id:
                  type: string
                answer:
                  type: string
      responses:
        "200":
          description: Answer delivered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/chat/answer-permission:
    post:
      operationId: answerPermission
      tags: [Chat]
      summary: Deliver a permission decision to a waiting turn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, granted]
              properties:
                session_id:
                  type: string
                granted:
                  type: boolean
      responses:
        "200":
          description: Permission decision delivered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/chat/last-turn-meta/{session_id}:
    get:
      operationId: lastTurnMeta
      tags: [Chat]
      summary: Get metadata for the last completed turn
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Turn metadata (provider, model, tokens)
          content:
            application/json:
              schema:
                type: object

  # ================================================================
  #  Agents
  # ================================================================
  /api/v1/agents:
    get:
      operationId: listAgents
      tags: [Agents]
      summary: List registered agent definitions
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentInfo"

  /api/v1/agents/{id}:
    get:
      operationId: getAgent
      tags: [Agents]
      summary: Get agent details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: saveAgent
      tags: [Agents]
      summary: Save (create or update) an agent definition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Raw TOML source of the agent definition
      responses:
        "200":
          description: Agent saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/agents/{id}/source:
    get:
      operationId: getAgentSource
      tags: [Agents]
      summary: Get the raw TOML source for an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent TOML source
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string

  /api/v1/agents/{id}/reset:
    post:
      operationId: resetAgent
      tags: [Agents]
      summary: Reset an agent to its built-in defaults
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/agents/tools:
    get:
      operationId: listAgentTools
      tags: [Agents]
      summary: List all available agent tools
      responses:
        "200":
          description: Tool list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/v1/agents/prompt-sections:
    get:
      operationId: listPromptSections
      tags: [Agents]
      summary: List available prompt section identifiers
      responses:
        "200":
          description: Prompt section list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/v1/agents/parse-toml:
    post:
      operationId: parseToml
      tags: [Agents]
      summary: Parse and validate agent TOML without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        "200":
          description: Parsed agent definition
          content:
            application/json:
              schema:
                type: object

  /api/v1/agents/reload:
    post:
      operationId: reloadAgents
      tags: [Agents]
      summary: Reload all agent definitions from disk
      responses:
        "200":
          description: Reload result
          content:
            application/json:
              schema:
                type: object
                properties:
                  loaded:
                    type: integer
                  errored:
                    type: integer

  /api/v1/agents/translate:
    post:
      operationId: translateText
      tags: [Agents]
      summary: Translate text using the configured provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, target_language]
              properties:
                text:
                  type: string
                target_language:
                  type: string
      responses:
        "200":
          description: Translated text
          content:
            application/json:
              schema:
                type: object
                properties:
                  translated:
                    type: string

  # ================================================================
  #  Tools
  # ================================================================
  /api/v1/tools:
    get:
      operationId: listTools
      tags: [Tools]
      summary: List registered tools
      responses:
        "200":
          description: List of tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolInfo"

  # ================================================================
  #  Config
  # ================================================================
  /api/v1/config:
    get:
      operationId: configGet
      tags: [Config]
      summary: Get the full configuration as JSON
      description: Reads all section TOML files and merges them into a single JSON object.
      responses:
        "200":
          description: Merged configuration
          content:
            application/json:
              schema:
                type: object

  /api/v1/config/{section}:
    get:
      operationId: configGetSection
      tags: [Config]
      summary: Get a config section as raw TOML
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
            enum: [providers, storage, session, runtime, hooks, tools, guardrails, browser, knowledge]
      responses:
        "200":
          description: Section content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
    put:
      operationId: configSaveSection
      tags: [Config]
      summary: Save a config section from raw TOML
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
            enum: [providers, storage, session, runtime, hooks, tools, guardrails, browser, knowledge]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Raw TOML content
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/config/reload:
    post:
      operationId: configReload
      tags: [Config]
      summary: Hot-reload all configuration
      description: |
        Reloads providers, guardrails, session, runtime, browser, tools,
        knowledge, hooks, prompts, and agents from disk.
      responses:
        "200":
          description: Reload summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/config/mcp:
    get:
      operationId: mcpConfigGet
      tags: [Config]
      summary: Get MCP server configuration
      responses:
        "200":
          description: MCP config
          content:
            application/json:
              schema:
                type: object
    put:
      operationId: mcpConfigSave
      tags: [Config]
      summary: Save MCP server configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
