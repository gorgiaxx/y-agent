    post:
      operationId: rewindExecute
      tags: [Rewind]
      summary: Execute a full three-phase rewind
      description: |
        Performs transcript truncation, file restoration, and checkpoint
        invalidation. Rolls back to the state at the target message.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_message_id]
