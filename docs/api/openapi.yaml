      summary: Read image files as base64
      description: |
        Reads files from the filesystem and returns base64-encoded data.
        Only image types are allowed: png, jpg, jpeg, gif, webp.
        Maximum file size: 20 MB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paths]
              properties:
                paths:
                  type: array
                  items:
                    type: string
      responses:
        "200":
