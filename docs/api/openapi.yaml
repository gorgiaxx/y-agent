# ===================================================================
# Components
# ===================================================================
components:
  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:
    # -- Error --
    ApiError:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Error code (e.g. "not_found", "bad_request")
        message:
          type: string
          description: Human-readable error message

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # -- Health --
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string

    HealthReport:
      type: object
      required: [status, diagnostics]
      properties:
        status:
          $ref: "#/components/schemas/StatusReport"
        diagnostics:
          $ref: "#/components/schemas/DiagnosticsHealth"

    StatusReport:
      type: object
      properties:
        version:
          type: string
        providers_registered:
          type: integer
        tools_registered:
          type: integer
        runtime_backend:
          type: string
        storage_status:
          type: string

    DiagnosticsHealth:
      type: object
      properties:
        trace_store_ok:
          type: boolean
        recent_trace_count:
          type: integer
        active_providers:
          type: integer
        frozen_providers:
          type: integer
        pg_feature_enabled:
          type: boolean

    # -- Session --
    SessionInfo:
      type: object
      properties:
        id:
          type: string
        agent_id:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        manual_title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        message_count:
          type: integer
        has_custom_prompt:
          type: boolean

    CreateSessionRequest:
      type: object
      properties:
        title:
          type: string
          nullable: true
        agent_id:
          type: string
          nullable: true

    BranchRequest:
      type: object
      properties:
        label:
          type: string
          nullable: true

    # -- Message --
    MessageInfo:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCallBrief"
        metadata:
          type: object
        skills:
          type: array
          nullable: true
          items:
            type: string

    ToolCallBrief:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        arguments:
          type: string

    # -- Chat --
    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: User message content
        session_id:
          type: string
          nullable: true
          description: Session ID to continue (auto-creates if omitted)

    ChatSendRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        session_id:
          type: string
          nullable: true
        agent_id:
          type: string
          nullable: true

    ChatResponse:
      type: object
      required: [content, model, session_id]
      properties:
        content:
          type: string
        model:
          type: string
        session_id:
          type: string
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cost_usd:
          type: number
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCallRecord"
        iterations:
          type: integer

    ToolCallRecord:
      type: object
      properties:
        name:
          type: string
        success:
          type: boolean
        duration_ms:
          type: integer
        result_content:
          type: string

    ChatCheckpointInfo:
      type: object
      properties:
        checkpoint_id:
          type: string
        session_id:
          type: string
        turn_number:
          type: integer
        message_count_before:
          type: integer
        created_at:
          type: string
          format: date-time

    # -- Agent --
    AgentInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        mode:
          type: string
        description:
          type: string
        icon:
          type: string
          nullable: true

    AgentDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        mode:
          type: string
        description:
          type: string
        icon:
          type: string
          nullable: true
        features:
          type: object
        knowledge_collections:
          type: array
          items:
            type: string
        prompt_section_ids:
          type: array
          items:
            type: string
        plan_mode:
          type: string
          nullable: true
        thinking_effort:
          type: string
          nullable: true
        permission_mode:
          type: string
          nullable: true

    # -- Tool --
    ToolInfo:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        parameters:
          type: object

    # -- Workspace --
    WorkspaceRecord:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string

    # -- Skill --
    SkillFileEntry:
      type: object
      properties:
        path:
          type: string
        name:
          type: string
        is_dir:
          type: boolean
        size:
          type: integer
        children:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/SkillFileEntry"

    # -- Rewind --
    RewindPointInfo:
      type: object
      properties:
        message_id:
          type: string
        turn_number:
          type: integer
        message_preview:
          type: string
        timestamp:
          type: integer
          description: Unix timestamp
        diff_stats:
          type: object

    RewindResult:
      type: object
      properties:
        target_message_id:
          type: string
        messages_removed:
          type: integer
        checkpoints_invalidated:
          type: integer
        file_report:
          type: object
          properties:
            restored:
              type: array
              items:
                type: string
            deleted:
              type: array
              items:
                type: string
            conflicts:
              type: array
              items:
                type: object

    # -- Attachment --
    AttachmentData:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        mime_type:
          type: string
        base64_data:
          type: string
        size:
          type: integer

    # -- Diagnostics --
    TraceInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        started_at:
          type: string
          format: date-time
        total_cost_usd:
          type: number
        total_input_tokens:
          type: integer
        total_output_tokens:
          type: integer
        total_duration_ms:
          type: integer
          nullable: true

    TraceDetail:
      type: object
      properties:
        trace:
          $ref: "#/components/schemas/TraceInfo"
        observations:
          type: array
          items:
            type: object
