      operationId: attachmentUploadFiles
      tags: [Attachments]
      summary: Upload image files for chat attachments
      description: |
        Accepts multipart file fields, stores images in the server temporary
        upload directory, and returns server-side paths.
        Only simple filenames and image extensions are accepted.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Uploaded files
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [path, filename, size]
                  properties:
                    path:
                      type: string
                    filename:
                      type: string
                    size:
                      type: integer
                      format: int64
        "400":
