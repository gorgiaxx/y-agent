name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  workflow-regressions:
    name: Workflow Regressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package AppImage script regression test
        run: bash scripts/tests/test-package-linux-appimage-relative-path.sh

      - name: CI frontend gate regression test
        run: bash scripts/tests/test-ci-frontend-gates.sh

      - name: CI and release cache regression test
        run: bash scripts/tests/test-ci-release-cache-gates.sh

  gui:
    name: GUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/y-gui/package-lock.json

      - name: Install GUI dependencies
        working-directory: crates/y-gui
        run: npm ci

      - name: Test GUI
        working-directory: crates/y-gui
        run: npm test

      - name: Lint GUI
        working-directory: crates/y-gui
        run: npm run lint

      - name: Build GUI
        working-directory: crates/y-gui
        run: npm run build

      - name: Build GUI web bundle
        working-directory: crates/y-gui
        run: npm run build:web

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-rust"

      - name: Install system dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libappindicator3-dev
            librsvg2-dev
            patchelf
            libssl-dev
            libsqlite3-dev
            libgtk-3-dev
          version: 1.0

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
