name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-shared"

      - name: Package AppImage script regression test
        run: bash scripts/tests/test-package-linux-appimage-relative-path.sh

      - name: Install system dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libappindicator3-dev
            librsvg2-dev
            patchelf
            libssl-dev
            libsqlite3-dev
            libgtk-3-dev
          version: 1.0

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
