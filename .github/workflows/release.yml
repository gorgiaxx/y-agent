name: Release

on:
  push:
    tags:
      - "v*"

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.1.0)"
        required: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always

jobs:
  # -- Gate: ensure CI passes before releasing ---------------------------------
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # -- Build and publish Docker image ------------------------------------------
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -- Build CLI + GUI per platform --------------------------------------------
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: ci-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            target: x86_64-unknown-linux-gnu
            binary: y-agent

          - os: macos-latest
            platform: darwin-arm64
            target: aarch64-apple-darwin
            binary: y-agent

          - os: windows-latest
            platform: windows-amd64
            target: x86_64-pc-windows-msvc
            binary: y-agent.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsqlite3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ inputs.tag || '0.0.0-dev' }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # -- CLI Binary ----------------------------------------------------------
      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} --bin y-agent

      - name: Strip CLI binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/y-agent

      # -- GUI (Tauri) App -----------------------------------------------------
      - name: Install frontend dependencies
        working-directory: crates/y-gui
        run: npm install

      - name: Build Tauri app
        working-directory: crates/y-gui
        run: npx @tauri-apps/cli build --target ${{ matrix.target }}

      # -- Package CLI zip (Unix) ------------------------------------------------
      - name: Package CLI zip (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CLI_ARCHIVE="y-agent-cli-${VERSION}-${{ matrix.platform }}"
          mkdir -p "dist/${CLI_ARCHIVE}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${CLI_ARCHIVE}/"
          cp -r config "dist/${CLI_ARCHIVE}/config"
          cp -r builtin-skills "dist/${CLI_ARCHIVE}/builtin-skills"
          cp README.md "dist/${CLI_ARCHIVE}/"
          cd dist && zip -r "${CLI_ARCHIVE}.zip" "${CLI_ARCHIVE}"

      - name: Package CLI zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $CLI_ARCHIVE = "y-agent-cli-${VERSION}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path "dist/${CLI_ARCHIVE}"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${CLI_ARCHIVE}/"
          Copy-Item -Recurse "config" "dist/${CLI_ARCHIVE}/config"
          Copy-Item -Recurse "builtin-skills" "dist/${CLI_ARCHIVE}/builtin-skills"
          Copy-Item "README.md" "dist/${CLI_ARCHIVE}/"
          Compress-Archive -Path "dist/${CLI_ARCHIVE}" -DestinationPath "dist/${CLI_ARCHIVE}.zip"

      # -- Package GUI zip (Unix) ------------------------------------------------
      - name: Package GUI zip (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GUI_ARCHIVE="y-agent-gui-${VERSION}-${{ matrix.platform }}"
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          mkdir -p "dist/${GUI_ARCHIVE}"
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp "${BUNDLE_DIR}"/dmg/*.dmg "dist/${GUI_ARCHIVE}/" 2>/dev/null || true
          else
            cp "${BUNDLE_DIR}"/deb/*.deb "dist/${GUI_ARCHIVE}/" 2>/dev/null || true
            cp "${BUNDLE_DIR}"/appimage/*.AppImage "dist/${GUI_ARCHIVE}/" 2>/dev/null || true
          fi
          cp README.md "dist/${GUI_ARCHIVE}/"
          cd dist && zip -r "${GUI_ARCHIVE}.zip" "${GUI_ARCHIVE}"

      - name: Package GUI zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $GUI_ARCHIVE = "y-agent-gui-${VERSION}-${{ matrix.platform }}"
          $BUNDLE_DIR = "target/${{ matrix.target }}/release/bundle"
          New-Item -ItemType Directory -Force -Path "dist/${GUI_ARCHIVE}"
          Copy-Item "${BUNDLE_DIR}/msi/*.msi" "dist/${GUI_ARCHIVE}/" -ErrorAction SilentlyContinue
          Copy-Item "${BUNDLE_DIR}/nsis/*.exe" "dist/${GUI_ARCHIVE}/" -ErrorAction SilentlyContinue
          Copy-Item "README.md" "dist/${GUI_ARCHIVE}/"
          Compress-Archive -Path "dist/${GUI_ARCHIVE}" -DestinationPath "dist/${GUI_ARCHIVE}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/*.zip

  # -- Create GitHub Release ---------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [docker, build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List release assets
        run: |
          echo "Release assets:"
          ls -lah dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "## Downloads" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Each zip contains both CLI binary and GUI installer, plus config and README." >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "| Platform | File |" >> CHANGELOG.md
          echo "|----------|------|" >> CHANGELOG.md
          for f in dist/y-agent-*.zip; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            echo "| ${fname} | [Download](${fname}) |" >> CHANGELOG.md
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: dist/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
