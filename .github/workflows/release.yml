name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.3). Leave empty to use Cargo.toml version."
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always

jobs:
  # -- Gate: run CI checks first -----------------------------------------------
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # -- Build CLI + GUI per platform --------------------------------------------
  build:
    name: Build (${{ matrix.platform }})
    needs: [ci]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-amd64
            target: x86_64-unknown-linux-gnu
            binary: y-agent

          - os: macos-latest
            platform: darwin-arm64
            target: aarch64-apple-darwin
            binary: y-agent

          - os: windows-latest
            platform: windows-amd64
            target: x86_64-pc-windows-msvc
            binary: y-agent.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          cache-targets: ${{ runner.os != 'Windows' }}
          cache-bin: "false"

      - name: Install system dependencies (Linux, cached)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libappindicator3-dev
            librsvg2-dev
            patchelf
            libssl-dev
            libsqlite3-dev
            libgtk-3-dev
          version: 1.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/y-gui/package-lock.json

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep -m1 'version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      # -- CLI Binary ----------------------------------------------------------
      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} --bin y-agent

      - name: Strip CLI binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/y-agent

      # -- GUI (Tauri) App -----------------------------------------------------
      - name: Install frontend dependencies
        working-directory: crates/y-gui
        run: npm ci

      - name: Build Tauri app
        working-directory: crates/y-gui
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ""
        run: npx @tauri-apps/cli build --ci --target ${{ matrix.target }}

      - name: Patch AppImage bundle (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          APPIMAGETOOL_PATH="$RUNNER_TEMP/appimagetool-x86_64.AppImage"
          curl -fsSL \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o "$APPIMAGETOOL_PATH"
          chmod +x "$APPIMAGETOOL_PATH"

          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          ORIGINAL_APPIMAGE="$(find "$BUNDLE_DIR/appimage" -maxdepth 1 -name '*.AppImage' | head -1)"
          mkdir -p "$BUNDLE_DIR/appimage-patched"

          APPIMAGETOOL="$APPIMAGETOOL_PATH" ./scripts/package-linux-appimage.sh \
            --source-appimage "$ORIGINAL_APPIMAGE" \
            --output-dir "$BUNDLE_DIR/appimage-patched"

          rm -f "$BUNDLE_DIR"/appimage/*.AppImage
          cp "$BUNDLE_DIR"/appimage-patched/*.AppImage "$BUNDLE_DIR/appimage/"

      - name: Cache Arch package build inputs
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            .cache/release/arch-pacman/pkg
            .cache/release/arch-cargo/registry
            .cache/release/arch-cargo/git
            .cache/release/arch-npm
          key: arch-pacman-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'crates/y-gui/package-lock.json') }}
          restore-keys: |
            arch-pacman-${{ runner.os }}-

      - name: Build pacman package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p \
            dist \
            .cache/release/arch-pacman/pkg \
            .cache/release/arch-cargo/registry \
            .cache/release/arch-cargo/git \
            .cache/release/arch-npm

          HOST_UID="$(id -u)"
          HOST_GID="$(id -g)"

          docker run --rm \
            -e VERSION="$VERSION" \
            -e HOST_UID="$HOST_UID" \
            -e HOST_GID="$HOST_GID" \
            -v "$GITHUB_WORKSPACE:/work" \
            -v "$GITHUB_WORKSPACE/.cache/release/arch-pacman/pkg:/var/cache/pacman/pkg" \
            -v "$GITHUB_WORKSPACE/.cache/release/arch-cargo:/cache/cargo" \
            -v "$GITHUB_WORKSPACE/.cache/release/arch-npm:/cache/npm" \
            -w /work \
            archlinux:base-devel \
            bash -lc '
              set -euo pipefail

              pacman -Syu --noconfirm --needed \
                base-devel \
                git \
                nodejs \
                npm \
                rust \
                webkit2gtk-4.1 \
                gtk3 \
                libsoup3 \
                openssl \
                sqlite \
                pkgconf

              if ! getent group "$HOST_GID" >/dev/null; then
                groupadd --gid "$HOST_GID" builder
              fi

              BUILDER_GROUP="$(getent group "$HOST_GID" | cut -d: -f1)"
              if getent passwd "$HOST_UID" >/dev/null; then
                BUILDER_USER="$(getent passwd "$HOST_UID" | cut -d: -f1)"
              else
                useradd -m --uid "$HOST_UID" --gid "$HOST_GID" builder
                BUILDER_USER="builder"
              fi

              mkdir -p /cache/cargo /cache/npm /home/builder/out
              chown -R "$BUILDER_USER":"$BUILDER_GROUP" /cache/cargo /cache/npm /home/builder/out

              su "$BUILDER_USER" -c "
                set -euo pipefail
                export CARGO_HOME=/cache/cargo
                export npm_config_cache=/cache/npm
                cd /work/crates/y-gui
                npm ci
                npm run build
                cd /work
                CARGO_TARGET_DIR=/work/target/arch-pacman cargo build --release --manifest-path crates/y-gui/src-tauri/Cargo.toml --bin y-gui
                ./scripts/package-linux-pacman.sh \
                  --version \"$VERSION\" \
                  --binary-path /work/target/arch-pacman/release/y-gui \
                  --output-dir /home/builder/out
              "

              cp /home/builder/out/*.pkg.tar.zst /work/dist/
            '

      # -- Package CLI (Unix) --------------------------------------------------
      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CLI_ARCHIVE="y-agent-cli-${VERSION}-${{ matrix.platform }}"
          mkdir -p "dist/${CLI_ARCHIVE}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${CLI_ARCHIVE}/"
          cp -r config "dist/${CLI_ARCHIVE}/config"
          cp -r skills "dist/${CLI_ARCHIVE}/skills"
          cp -r data "dist/${CLI_ARCHIVE}/data" 2>/dev/null || true
          cp README.md "dist/${CLI_ARCHIVE}/"
          cd dist && tar czf "${CLI_ARCHIVE}.tar.gz" "${CLI_ARCHIVE}"

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $CLI_ARCHIVE = "y-agent-cli-${VERSION}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path "dist/${CLI_ARCHIVE}"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${CLI_ARCHIVE}/"
          Copy-Item -Recurse "config" "dist/${CLI_ARCHIVE}/config"
          Copy-Item -Recurse "skills" "dist/${CLI_ARCHIVE}/skills"
          if (Test-Path "data") { Copy-Item -Recurse "data" "dist/${CLI_ARCHIVE}/data" }
          Copy-Item "README.md" "dist/${CLI_ARCHIVE}/"
          Compress-Archive -Path "dist/${CLI_ARCHIVE}" -DestinationPath "dist/${CLI_ARCHIVE}.zip"

      # -- Collect GUI installers (Unix) ---------------------------------------
      - name: Collect GUI installers (Unix)
        if: runner.os != 'Windows'
        run: |
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          mkdir -p dist
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp "${BUNDLE_DIR}"/dmg/*.dmg dist/ 2>/dev/null || true
          else
            cp "${BUNDLE_DIR}"/deb/*.deb dist/ 2>/dev/null || true
            cp "${BUNDLE_DIR}"/appimage/*.AppImage dist/ 2>/dev/null || true
            cp "${BUNDLE_DIR}"/rpm/*.rpm dist/ 2>/dev/null || true
          fi

      - name: Collect GUI installers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BUNDLE_DIR = "target/${{ matrix.target }}/release/bundle"
          New-Item -ItemType Directory -Force -Path "dist"
          Copy-Item "${BUNDLE_DIR}/msi/*.msi" "dist/" -ErrorAction SilentlyContinue
          Copy-Item "${BUNDLE_DIR}/nsis/*.exe" "dist/" -ErrorAction SilentlyContinue

      # -- List produced artifacts for debugging -------------------------------
      - name: List artifacts
        shell: bash
        run: |
          echo "=== dist/ contents ==="
          ls -lah dist/ 2>/dev/null || echo "(empty)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.dmg
            dist/*.deb
            dist/*.AppImage
            dist/*.rpm
            dist/*.pkg.tar.zst
            dist/*.msi
            dist/*.exe

  # -- Create GitHub Release ---------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep -m1 'version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Determine tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${{ steps.version.outputs.version }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # For workflow_dispatch: create tag if it does not exist
      - name: Create tag (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag: ${TAG}"
          else
            echo "Tag ${TAG} already exists."
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS.txt 2>/dev/null || true
          echo "=== SHA256 checksums ==="
          cat SHA256SUMS.txt

      - name: Generate release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DIST_DIR: dist
          OUTPUT_FILE: RELEASE_NOTES.md
        run: |
          chmod +x .github/scripts/generate-release-notes.sh
          ./.github/scripts/generate-release-notes.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "y-agent v${{ steps.version.outputs.version }}"
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.dmg
            dist/*.deb
            dist/*.AppImage
            dist/*.rpm
            dist/*.pkg.tar.zst
            dist/*.msi
            dist/*.exe
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
