  #         cache-from: type=gha
  #         cache-to: type=gha,mode=max

  # -- Build CLI + GUI per platform --------------------------------------------
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-amd64
            target: x86_64-unknown-linux-gnu
            binary: y-agent

          - os: macos-latest
            platform: darwin-arm64
            target: aarch64-apple-darwin
            binary: y-agent

          - os: windows-latest
            platform: windows-amd64
            target: x86_64-pc-windows-msvc
            binary: y-agent.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install system dependencies (Linux, cached)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libappindicator3-dev
            librsvg2-dev
            patchelf
            libssl-dev
            libsqlite3-dev
            libgtk-3-dev
          version: 1.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # -- CLI Binary ----------------------------------------------------------
      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} --bin y-agent

      - name: Strip CLI binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/y-agent

      # -- GUI (Tauri) App -----------------------------------------------------
      - name: Install frontend dependencies
        working-directory: crates/y-gui
        run: npm ci || npm install

      - name: Build Tauri app
        working-directory: crates/y-gui
        env:
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ""
        run: npx @tauri-apps/cli build --ci --target ${{ matrix.target }}

      # -- Package CLI (Unix) --------------------------------------------------
      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CLI_ARCHIVE="y-agent-cli-${VERSION}-${{ matrix.platform }}"
          mkdir -p "dist/${CLI_ARCHIVE}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${CLI_ARCHIVE}/"
          cp -r config "dist/${CLI_ARCHIVE}/config"
          cp -r builtin-skills "dist/${CLI_ARCHIVE}/builtin-skills"
          cp -r data "dist/${CLI_ARCHIVE}/data" 2>/dev/null || true
          cp README.md "dist/${CLI_ARCHIVE}/"
          cd dist && tar czf "${CLI_ARCHIVE}.tar.gz" "${CLI_ARCHIVE}"

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $CLI_ARCHIVE = "y-agent-cli-${VERSION}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path "dist/${CLI_ARCHIVE}"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${CLI_ARCHIVE}/"
          Copy-Item -Recurse "config" "dist/${CLI_ARCHIVE}/config"
          Copy-Item -Recurse "builtin-skills" "dist/${CLI_ARCHIVE}/builtin-skills"
          if (Test-Path "data") { Copy-Item -Recurse "data" "dist/${CLI_ARCHIVE}/data" }
          Copy-Item "README.md" "dist/${CLI_ARCHIVE}/"
          Compress-Archive -Path "dist/${CLI_ARCHIVE}" -DestinationPath "dist/${CLI_ARCHIVE}.zip"

      # -- Collect GUI installers (Unix) ---------------------------------------
      - name: Collect GUI installers (Unix)
        if: runner.os != 'Windows'
        run: |
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          mkdir -p dist
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp "${BUNDLE_DIR}"/dmg/*.dmg dist/ 2>/dev/null || true
          else
            cp "${BUNDLE_DIR}"/deb/*.deb dist/ 2>/dev/null || true
            cp "${BUNDLE_DIR}"/appimage/*.AppImage dist/ 2>/dev/null || true
            cp "${BUNDLE_DIR}"/rpm/*.rpm dist/ 2>/dev/null || true
          fi

      - name: Collect GUI installers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BUNDLE_DIR = "target/${{ matrix.target }}/release/bundle"
          New-Item -ItemType Directory -Force -Path "dist"
          Copy-Item "${BUNDLE_DIR}/msi/*.msi" "dist/" -ErrorAction SilentlyContinue
          Copy-Item "${BUNDLE_DIR}/nsis/*.exe" "dist/" -ErrorAction SilentlyContinue

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.dmg
            dist/*.deb
            dist/*.AppImage
            dist/*.rpm
            dist/*.msi
            dist/*.exe

  # -- Create GitHub Release ---------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS.txt 2>/dev/null || true
          echo "=== SHA256 checksums ==="
          cat SHA256SUMS.txt

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "## Downloads" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### CLI (command-line)" >> CHANGELOG.md
          echo "| Platform | Archive |" >> CHANGELOG.md
          echo "|----------|---------|" >> CHANGELOG.md
          for f in dist/y-agent-cli-*.tar.gz dist/y-agent-cli-*.zip; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            echo "| ${fname} | [Download](${fname}) |" >> CHANGELOG.md
          done

          echo "" >> CHANGELOG.md
          echo "### GUI (desktop app)" >> CHANGELOG.md
          echo "| Platform | Installer |" >> CHANGELOG.md
          echo "|----------|-----------|" >> CHANGELOG.md
          for f in dist/*.dmg dist/*.deb dist/*.AppImage dist/*.rpm dist/*.msi dist/*.exe; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            echo "| ${fname} | [Download](${fname}) |" >> CHANGELOG.md
          done

          echo "" >> CHANGELOG.md
          echo "### Verification" >> CHANGELOG.md
          echo "Verify downloads with \`sha256sum -c SHA256SUMS.txt\`" >> CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.dmg
            dist/*.deb
            dist/*.AppImage
            dist/*.rpm
            dist/*.msi
            dist/*.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
