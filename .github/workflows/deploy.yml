name: Deploy

on:
  # Auto-trigger after release workflow completes
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

  # Manual trigger with version override
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to deploy (e.g. 0.1.0 or latest)"
        required: true
        default: "latest"
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    # Only deploy if release succeeded (for workflow_run trigger)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: http://${{ secrets.DEPLOY_HOST }}:8080

    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Extract tag from the release that triggered this
            TAG="${GITHUB_REF_NAME:-latest}"
            TAG="${TAG#v}"  # strip leading 'v'
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"
            
            echo "==> Deploying ${IMAGE} to ${DEPLOY_DIR}"
            cd "${DEPLOY_DIR}"
            
            # Save current image tag for rollback
            docker compose ps --format json | jq -r '.[0].Image // empty' > .previous-image 2>/dev/null || true
            
            # Pull new image
            echo "==> Pulling image..."
            docker pull "${IMAGE}"
            
            # Update image in .env
            echo "==> Updating image tag..."
            sed -i "s|^Y_AGENT_IMAGE=.*|Y_AGENT_IMAGE=${IMAGE}|" .env 2>/dev/null || \
              echo "Y_AGENT_IMAGE=${IMAGE}" >> .env
            
            # Run database migrations if available
            if [ -d "migrations" ]; then
              echo "==> Running migrations..."
              docker compose run --rm y-agent migrate || true
            fi
            
            # Deploy with zero-downtime restart
            echo "==> Restarting services..."
            docker compose up -d --remove-orphans
            
            # Wait for health check
            echo "==> Waiting for health check..."
            RETRIES=0
            MAX_RETRIES=30
            until curl -sf http://localhost:8080/health > /dev/null 2>&1; do
              RETRIES=$((RETRIES + 1))
              if [ $RETRIES -ge $MAX_RETRIES ]; then
                echo "ERROR: Health check failed after ${MAX_RETRIES} attempts"
                
                # Rollback
                echo "==> Rolling back..."
                PREV_IMAGE=$(cat .previous-image 2>/dev/null || echo "")
                if [ -n "${PREV_IMAGE}" ]; then
                  sed -i "s|^Y_AGENT_IMAGE=.*|Y_AGENT_IMAGE=${PREV_IMAGE}|" .env
                  docker compose up -d --remove-orphans
                  echo "==> Rolled back to ${PREV_IMAGE}"
                fi
                exit 1
              fi
              sleep 2
            done
            
            echo "==> Deployment successful!"
            
            # Clean up old images
            docker image prune -f --filter "until=168h" || true

      - name: Verify deployment
        run: |
          echo "Deployed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"
          echo "Target: ${{ secrets.DEPLOY_HOST }}"
